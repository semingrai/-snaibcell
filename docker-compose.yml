version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: snaibcell-backend
    restart: always
    env_file:
      - backend/.env
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: snaibcell-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
